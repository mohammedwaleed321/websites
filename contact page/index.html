<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>contact page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="header">
            <img src="contact-page-master/resources/Logo@2x.png">
        </div>
        <div class="container">
            <div class="intro">
                <h1>Interested in our business pricing?</h1>
                <p>Fill out the form to view details and we'll contact you as soon as possiple</p>
            </div>
            <div class="form-box">
                <div class="forms">
                        <div class="form">
                            <form>
                            <label for="name">Name</label>
                            <br>
                            <input id="name" name="name" type="text" required>  
                        </div>
                        <div class="form">
                            <label for="email">Company Email</label>
                            <br>
                            <input id="email" name="email" type="text" required>  
                        </div>
                        <div class="form">
                            <label for="size">Company Size</label>
                            <br>
                            <select>
                                <option>1-10</option>
                                <option>10-50</option>
                                <option>50-100</option>
                                <option>100-500</option>
                                <option>500-1000</option>
                                <option>bigger than these</option>
                            </select>
                        </div>
                        <div class="form">
                            <label for="size">Subject</label>
                            <br>
                            <select>
                                <option>building landing pages</option>
                                <option>building desktop apps</option>
                                <option>building operation systems</option>
                                <option>building mobile apps</option>
                                <option>developing games</option>
                                <option>building ai</option>
                            </select>
                        </div>
                        <div class="form">
                            <label for="message">Message</label>
                            <br>
                            <textarea>

                            </textarea>
                        </div>
                        <div class="submit">
                                <input type="submit" value="Contact Sales">
                            </form>
                        </div>
                </div>
            </div>
        </div>
    </body>
</html>
